{% extends 'consultant_base.html' %}

{% block content %}
<div class="container mt-3">

    <a href="{% url 'consultant_dashboard' %}" class="btn btn-secondary mb-3">
        ← Back to Dashboard
    </a>

</div>
<div class="container mt-5">

<div class="card shadow">

<div class="card-header bg-primary text-white">
<h3>Notifications</h3>
</div>

<div class="card-body">

<table class="table table-bordered">

<tr>

<th>Message</th>

<th>Date</th>

<th>Status</th>

<th>Action</th>

</tr>

{% for n in notifications %}

<tr>

<td>{{ n.message }}</td>

<td>{{ n.created_at }}</td>

<td>

{% if n.is_read %}

<span class="badge bg-success">Read</span>

{% else %}

<span class="badge bg-danger">New</span>

{% endif %}

</td>

<td>

<a href="{% url 'student_detail' n.student.id %}"
class="btn btn-primary">

View

</a>

</td>

</tr>

{% empty %}

<tr>

<td colspan="4" class="text-center">

No Notifications

</td>

</tr>

{% endfor %}

</table>

</div>

</div>

</div>

{% endblock %}
