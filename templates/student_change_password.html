{% extends 'student_base.html' %}

{% block content %}

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3>Change Password</h3>
        </div>

        <div class="card-body">

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-info">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Current Password</label>
                    <input
                        type="password"
                        name="current_password"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label>New Password</label>
                    <input
                        type="password"
                        name="new_password"
                        class="form-control"
                        required>
                </div>

                <div class="mb-3">
                    <label>Confirm Password</label>
                    <input
                        type="password"
                        name="confirm_password"
                        class="form-control"
                        required>
                </div>

                <button class="btn btn-success">
                    Update Password
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}
